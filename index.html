<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Code & Clicks - Modern Development & Testing Blog</title>
    <meta
      name="description"
      content="Code & Clicks: Your hub for modern development, testing, and automation. Learn Java, JavaScript, Playwright, Selenium, and more!"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  </head>
  <body>
    <div id="app">🚀 Loading...</div>
    <script>
      window.$docsify = {
        name: '',
        //repo: 'https://github.com/yourusername/blogify',
        loadSidebar: true,
        subMaxLevel: 3,
        maxLevel: 4,
        alias: {
          '/.*/_sidebar.md': '/_sidebar.md',
        },
        sidebarDisplayLevel: 0,
        auto2top: true,
        
        // Sidebar collapsible - child nodes collapsed by default
        sidebarCollapsible: true,
        homepage: 'README.md',
        loadNavbar: false,
        coverpage: true,
        onlyCover: false,
        
        // Search configuration
        search: {
          placeholder: 'Search...',
          noData: 'No results found',
          depth: 6,
        },

        
        // Pagination
        pagination: {
          previousText: '← PREVIOUS',
          nextText: 'NEXT →',
          crossChapter: true,
          crossChapterText: true,
        },
        
        // Copy Code
        copyCode: {
          buttonText: '📋 Copy',
          errorText: '❌ Error',
          successText: '✅ Copied!'
        },
        
        // Tabs
        tabs: {
          persist: true,
          sync: true,
          theme: 'material',
          tabComments: true,
          tabHeadings: true
        }
      };
    </script>

    <!-- Core Docsify -->
    <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
    
    <!-- Plugins -->
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-tabs@1/dist/docsify-tabs.min.js"></script>
    
    <!-- Custom Search Integration & Theme Switcher -->
    <script>
      // Integrate custom header search with Docsify search
      function initializeSearch() {
        const headerSearch = document.getElementById('header-search');
        if (!headerSearch) return;
        
        // Wait for Docsify search to be ready
        const checkSearch = setInterval(function() {
          const docsifySearch = document.querySelector('.search input[type="search"]');
          if (docsifySearch) {
            clearInterval(checkSearch);
            
            // Sync header search with Docsify search
            headerSearch.addEventListener('input', function(e) {
              docsifySearch.value = e.target.value;
              const inputEvent = new Event('input', { bubbles: true });
              docsifySearch.dispatchEvent(inputEvent);
              
              // Trigger keyup for better compatibility
              const keyupEvent = new KeyboardEvent('keyup', { bubbles: true });
              docsifySearch.dispatchEvent(keyupEvent);
            });
            
            // Show search results when typing in header
            headerSearch.addEventListener('focus', function() {
              docsifySearch.focus();
              setTimeout(() => headerSearch.focus(), 10);
            });
            
            // Sync results back to header
            docsifySearch.addEventListener('input', function(e) {
              if (e.target.value !== headerSearch.value) {
                headerSearch.value = e.target.value;
              }
            });
          }
        }, 100);
        
        // Clear interval after 5 seconds if search not found
        setTimeout(() => clearInterval(checkSearch), 5000);
      }
      
      // Initialize search when DOM is ready
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initializeSearch);
      } else {
        initializeSearch();
      }
      
      // Also initialize after a short delay to ensure Docsify is loaded
      setTimeout(initializeSearch, 1000);
    </script>
    
    <!-- Syntax Highlighting -->
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-java.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-javascript.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-markdown.min.js"></script>
    
    <!-- Mermaid for Diagrams -->
    <script src="//cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-mermaid@2/dist/docsify-mermaid.js"></script>
    <script>mermaid.initialize({ startOnLoad: true, theme: 'default' });</script>
    
    <!-- Zoom Image -->
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
    
    <!-- Emoji Support -->
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/emoji.min.js"></script>

    <!-- Docsify Default Style (Free) -->
    <link rel="stylesheet" href="https://unpkg.com/docsify/lib/themes/vue.css">

    <!-- Custom Footer -->
    <script>
      // Add footer dynamically
      window.addEventListener('load', function() {
        const footer = document.createElement('footer');
        footer.className = 'app-footer';
        footer.innerHTML = `
          <div class="app-footer-content">
            <div class="app-footer-links">
              <a href="#/">Home</a>
              <a href="https://github.com/codeandclicks/blogify" target="_blank">GitHub</a>
              <a href="#/blogs/java/basic/Introduction">Java</a>
              <a href="#/blogs/javascript/Introduction">JavaScript</a>
              <a href="#/blogs/api/Introduction">API Testing</a>
            </div>
            <div class="app-footer-copyright">
              © ${new Date().getFullYear()} Code & Clicks. Built with ❤️ using Docsify.
            </div>
          </div>
        `;
        
        const main = document.querySelector('main');
        if (main) {
          main.appendChild(footer);
        }
      });
    </script>
  </body>
</html>
